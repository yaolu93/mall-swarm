services:
  mall-admin:
    image: mall/mall-admin:1.0-SNAPSHOT
    container_name: mall-admin
    ports:
      - 8080:8080
    volumes:
      - /mydata/app/mall-admin/logs:/var/logs
      - /etc/localtime:/etc/localtime
    environment:
      - 'TZ="Asia/Shanghai"'
      - SPRING_CLOUD_NACOS_DISCOVERY_ENABLED=false
      - SPRING_CLOUD_NACOS_CONFIG_ENABLED=false
      - SPRING_CLOUD_DISCOVERY_ENABLED=false
      # object storage defaults (used by prod profile)
      - ALIYUN_OSS_ENDPOINT=oss-cn-shenzhen.aliyuncs.com
      - ALIYUN_OSS_ACCESS_KEY_ID=test
      - ALIYUN_OSS_ACCESS_KEY_SECRET=test
      - ALIYUN_OSS_BUCKET_NAME=macro-oss
      - ALIYUN_OSS_CALLBACK=http://localhost:9000/oss/callback
      # minio placeholders (admin service will not start without MINIO_ENDPOINT)
      - MINIO_ENDPOINT=http://localhost:9000
      - MINIO_BUCKET_NAME=mall
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mall-network
  mall-search:
    image: mall/mall-search:1.0-SNAPSHOT
    container_name: mall-search
    ports:
      - 8081:8081
    volumes:
      - /mydata/app/mall-search/logs:/var/logs
      - /etc/localtime:/etc/localtime
    environment:
      - 'TZ="Asia/Shanghai"'
      - SPRING_CLOUD_NACOS_DISCOVERY_ENABLED=false
      - SPRING_CLOUD_NACOS_CONFIG_ENABLED=false
      - SPRING_CLOUD_DISCOVERY_ENABLED=false
      # override Elasticsearch host if necessary
      - SPRING_DATA_ELASTICSEARCH_CLIENT_ENDPOINTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - mall-network
  mall-portal:
    image: mall/mall-portal:1.0-SNAPSHOT
    container_name: mall-portal
    ports:
      - 8085:8085
    volumes:
      - /mydata/app/mall-portal/logs:/var/logs
      - /etc/localtime:/etc/localtime
    environment:
      - 'TZ="Asia/Shanghai"'
      - SPRING_CLOUD_NACOS_DISCOVERY_ENABLED=false
      - SPRING_CLOUD_NACOS_CONFIG_ENABLED=false
      - SPRING_CLOUD_DISCOVERY_ENABLED=false
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - mall-network
  mall-auth:
    image: mall/mall-auth:1.0-SNAPSHOT
    container_name: mall-auth
    ports:
      - 8401:8401
    volumes:
      - /mydata/app/mall-auth/logs:/var/logs
      - /etc/localtime:/etc/localtime
    environment:
      - 'TZ="Asia/Shanghai"'
      - SPRING_CLOUD_NACOS_DISCOVERY_ENABLED=false
      - SPRING_CLOUD_NACOS_CONFIG_ENABLED=false
      - SPRING_CLOUD_DISCOVERY_ENABLED=false
      # Feign clients are configured with fixed URLs; environment variables
      # are used by the @FeignClient annotations in mall-auth.  The defaults
      # should resolve within the compose network.
      - MALL_ADMIN_URL=http://mall-admin:8080
      - MALL_PORTAL_URL=http://mall-portal:8085
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mall-network
  mall-gateway:
    image: mall/mall-gateway:1.0-SNAPSHOT
    container_name: mall-gateway
    ports:
      - 8201:8201
    volumes:
      - /mydata/app/mall-gateway/logs:/var/logs
      - /etc/localtime:/etc/localtime
    environment:
      - 'TZ="Asia/Shanghai"'
      - SPRING_CLOUD_NACOS_DISCOVERY_ENABLED=false
      - SPRING_CLOUD_NACOS_CONFIG_ENABLED=false
      - SPRING_CLOUD_DISCOVERY_ENABLED=false
      - SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED=false
    depends_on:
      redis:
        condition: service_started
    networks:
      - mall-network
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 2181:2181
    networks:
      - mall-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - 9092:9092
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/kafka/9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - zookeeper
    networks:
      - mall-network

  mall-monitor:
    image: mall/mall-monitor:1.0-SNAPSHOT
    container_name: mall-monitor
    ports:
      - 8101:8101
    volumes:
      - /mydata/app/mall-monitor/logs:/var/logs
      - /etc/localtime:/etc/localtime
    environment:
      - 'TZ="Asia/Shanghai"'
      - SPRING_CLOUD_NACOS_DISCOVERY_ENABLED=false
      - SPRING_CLOUD_NACOS_CONFIG_ENABLED=false
      - SPRING_CLOUD_DISCOVERY_ENABLED=false
    networks:
      - mall-network