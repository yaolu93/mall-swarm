server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:db}:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:reader}
    password: ${DB_PASSWORD:123456}
  data:
    mongodb:
      host: ${MONGODB_HOST:mongo}
      port: 27017
      database: mall-port
    redis:
      host: ${REDIS_HOST:redis}
      database: 0
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbit}
    port: 5672
    virtual-host: /mall
    username: ${RABBITMQ_USERNAME:mall}
    password: ${RABBITMQ_PASSWORD:mall}

logging:
  config: classpath:logback-spring.xml
  file:
    path: /var/logs
  level:
    root: warn
    com.macro.mall: info
    org.springframework: warn

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

sa-token:
  timeout: 3600
  active-timeout: 1800
  refresh-time: 600
  is-concurrent: false
  is-log: false
  jwt-secret-key: ${JWT_SECRET_KEY}
  is-print: false
